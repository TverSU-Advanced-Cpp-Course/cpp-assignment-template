name: hidden-grader

on:
  push:
    branches: [main]
  pull_request:

jobs:
  grade:
    runs-on: ubuntu-latest
    if: ${{ secrets.INFRA_TESTS_TOKEN != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ git

      - name: Determine assignment ID
        id: assignment
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          ASSIGNMENT_ID=$(echo "$REPO_NAME" | sed 's/-.*$//')
          echo "id=$ASSIGNMENT_ID" >> $GITHUB_OUTPUT
          echo "Assignment ID: $ASSIGNMENT_ID"

      - name: Clone hidden tests
        env:
          INFRA_TESTS_TOKEN: ${{ secrets.INFRA_TESTS_TOKEN }}
          INFRA_TESTS_REPO: TverSU-Advanced-Cpp-Course/course-infra-tests
          ASSIGNMENT_ID: ${{ steps.assignment.outputs.id }}
        run: |
          git clone --depth 1 \
            https://x-access-token:${INFRA_TESTS_TOKEN}@github.com/${INFRA_TESTS_REPO}.git \
            infra-tests
          
          TESTS_PATH="infra-tests/assignments/${ASSIGNMENT_ID}/stage-01/hidden"
          if [ ! -d "$TESTS_PATH" ]; then
            echo "::warning::No hidden tests found for assignment $ASSIGNMENT_ID"
            exit 0
          fi

      - name: Configure with hidden tests
        env:
          ASSIGNMENT_ID: ${{ steps.assignment.outputs.id }}
        run: |
          TESTS_PATH="${PWD}/infra-tests/assignments/${ASSIGNMENT_ID}/stage-01/hidden"
          
          cmake -S . -B build-hidden -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DENABLE_SANITIZERS=ON \
            -DBUILD_PUBLIC_TESTS=OFF \
            -DEXTRA_TESTS_DIR="$TESTS_PATH"

      - name: Build
        run: cmake --build build-hidden -j

      - name: Run hidden tests
        run: ctest --test-dir build-hidden --output-on-failure

      - name: Set commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSIGNMENT_ID: ${{ steps.assignment.outputs.id }}
        run: |
          STATE="success"
          DESCRIPTION="Hidden tests passed"
          
          if [ "${{ job.status }}" != "success" ]; then
            STATE="failure"
            DESCRIPTION="Hidden tests failed"
          fi
          
          curl -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{
              \"state\": \"${STATE}\",
              \"context\": \"hidden-grader/${ASSIGNMENT_ID}/stage-01\",
              \"description\": \"${DESCRIPTION}\",
              \"target_url\": \"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"
            }"