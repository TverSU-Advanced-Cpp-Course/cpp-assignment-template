name: public-ci

on:
  push:
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang-format \
            clang-tidy \
            g++ \
            git

      - name: Check formatting
        run: ./tools/check_format.sh

      - name: Configure
        run: ./tools/configure.sh build

      - name: Build
        run: cmake --build build -j

      - name: Run public tests
        run: ctest --test-dir build --output-on-failure